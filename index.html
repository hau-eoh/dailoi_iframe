<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Điều Khiển Nhà Máy Nước</title>
    <!-- Boxicons for typography and icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-wrap">
        <!-- Optional background image layer -->
        <div class="bg-layer" style="background-image: url('bg.png');"></div>
        
        <header class="header-glass">
            <h1><i class='bx bx-water'></i> BẢNG ĐIỀU KHIỂN NHÀ MÁY NƯỚC</h1>
            <div class="status-badge connected">
                <span class="dot"></span> 
                <span id="connectionStatus">Đang kết nối...</span>
            </div>
        </header>

        <main class="dashboard-grid">
            
            <!-- RESERVOIR PANEL -->
            <div class="glass-panel">
                <div class="panel-header">
                    <h2><i class='bx bx-cylinder'></i> Mức Nước Hồ Chứa</h2>
                </div>
                <div class="panel-body flex-center">
                    <div class="tank-container">
                        <div class="tank">
                            <!-- Water Fill -->
                            <div class="water" id="waterLevelFill" style="height: 0%;">
                                <div class="wave"></div>
                                <div class="wave wave2"></div>
                            </div>
                        </div>
                        <div class="tank-ruler">
                            <span>100%</span>
                            <span>75%</span>
                            <span>50%</span>
                            <span>25%</span>
                            <span>0%</span>
                        </div>
                    </div>
                    <div class="data-readout text-center mt-3">
                        <span class="value cyan-text" id="valLevel">--</span>
                        <span class="unit">%</span>
                    </div>
                </div>
            </div>

            <!-- PUMP & PIPING PANEL -->
            <div class="glass-panel middle-panel">
                <div class="panel-header">
                    <h2><i class='bx bx-git-commit'></i> Trạm Bơm Nước</h2>
                </div>
                <div class="panel-body">
                    
                    <div class="piping-system">
                        <div class="sensor-readouts d-flex-between">
                            <div class="sensor-box">
                                <span class="sensor-label"><i class='bx bx-tachometer'></i> Áp Suất</span>
                                <div class="data-readout">
                                    <span class="value" id="valPressure">--</span>
                                    <span class="unit">Bar</span>
                                </div>
                            </div>
                            <div class="sensor-box">
                                <span class="sensor-label"><i class='bx bx-droplet'></i> Lưu Lượng</span>
                                <div class="data-readout">
                                    <span class="value" id="valFlow">--</span>
                                    <span class="unit">m³/h</span>
                                </div>
                            </div>
                        </div>

                        <!-- Animated SVG Pipe and Pump representation -->
                        <div class="pump-graphic flex-center mt-4 mb-4">
                            <!-- Pump icon -->
                            <div class="pump-wrapper" id="pumpGraphic">
                                <div class="motor-layer">
                                    <i class='bx bx-loader-circle' id="pumpRotor"></i>
                                </div>
                                <div class="housing-layer">
                                    <i class='bx bx-hive'></i>
                                </div>
                            </div>
                        </div>

                        <div class="pump-controls flex-center gap-3">
                            <button class="btn btn-on" id="btnPumpOn"><i class='bx bx-power-off'></i> BẬT BƠM</button>
                            <button class="btn btn-off" id="btnPumpOff"><i class='bx bx-power-off'></i> TẮT BƠM</button>
                        </div>
                        
                        <div class="status-indicator mt-3 text-center">
                            <span class="status-dot disabled" id="statusDot"></span>
                            <span class="status-text" id="statusText">Trạng thái: Chưa rõ</span>
                        </div>
                    </div>

                </div>
            </div>

            <!-- ELECTRICAL PANEL -->
            <div class="glass-panel">
                <div class="panel-header">
                    <h2><i class='bx bxs-bolt'></i> Giám Sát Điện Năng</h2>
                </div>
                <div class="panel-body electrical-grid">
                    
                    <div class="meter-box vol-box">
                        <div class="meter-title">ĐIỆN ÁP (1 Pha)</div>
                        <div class="meter-value amber-text">
                            <span id="valVoltage">--</span><span class="meter-unit">V</span>
                        </div>
                        <div class="meter-bar"><div class="fill" id="barVoltage" style="width: 0%;"></div></div>
                    </div>

                    <div class="meter-box cur-box">
                        <div class="meter-title">DÒNG ĐIỆN (1 Pha)</div>
                        <div class="meter-value amber-text">
                            <span id="valCurrent">--</span><span class="meter-unit">A</span>
                        </div>
                        <div class="meter-bar"><div class="fill" id="barCurrent" style="width: 0%;"></div></div>
                    </div>

                    <div class="meter-box energy-box col-span-2">
                        <div class="meter-title">TỔNG ĐIỆN NĂNG TIÊU THỤ</div>
                        <div class="meter-value green-text text-xl">
                            <span id="valEnergy">--</span><span class="meter-unit">kWh</span>
                        </div>
                        <div class="led-stripes">
                            <span></span><span></span><span></span><span></span><span></span>
                            <span></span><span></span><span></span><span></span><span></span>
                        </div>
                    </div>

                </div>
            </div>

        </main>
    </div>

    <!-- E-Ra Widget Library -->
    <script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
    <!-- App Logic -->
    <script src="script.js"></script>
    <!-- Mock logic to test if not opened in iframe -->
    <script src="mock_data.js"></script>
</body>
</html>
